<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Tides Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 20px 0;
    }
    .header h1 {
      font-size: 24px;
      color: #4fc3f7;
    }
    .header p {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
    }
    .card h2 {
      font-size: 16px;
      color: #4fc3f7;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #0f3460;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      color: #fff;
      margin-bottom: 12px;
    }
    input::placeholder { color: #666; }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn-save {
      background: #4fc3f7;
      color: #1a1a2e;
    }
    .btn-cancel {
      background: #333;
      color: #aaa;
      margin-top: 10px;
    }
    .wave-emoji { font-size: 32px; }
    .toggle-group {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #4fc3f7;
      margin-bottom: 12px;
    }
    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      color: #aaa;
      background: #0f3460;
      cursor: pointer;
      margin-bottom: 0;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-group input[type="radio"]:checked + label {
      background: #4fc3f7;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="wave-emoji">&#x1F30A;</div>
    <h1>Pixel Tides</h1>
    <p>Configure your tide location</p>
  </div>

  <div class="card">
    <h2>Location</h2>
    <label for="zipCode">ZIP Code</label>
    <input type="text" id="zipCode" placeholder="e.g. 08401" maxlength="10">
    <p class="hint">US ZIP code for nearest NOAA tide station</p>
  </div>

  <div class="card">
    <h2>Display Mode</h2>
    <div class="toggle-group">
      <input type="radio" name="displayMode" id="modeMinimal" value="0">
      <label for="modeMinimal">Minimal</label>
      <input type="radio" name="displayMode" id="modeDetailed" value="1">
      <label for="modeDetailed">Detailed</label>
    </div>
    <p class="hint">Minimal: tide direction only. Detailed: tide times + sunrise/sunset times.</p>
  </div>

  <div class="card">
    <h2>Advanced (Optional)</h2>
    <label for="stationId">NOAA Station ID</label>
    <input type="text" id="stationId" placeholder="e.g. 8534720">
    <p class="hint">Override auto-detection. Find your station at <br>tidesandcurrents.noaa.gov</p>
  </div>

  <button class="btn btn-save" id="saveBtn">Save Settings</button>
  <button class="btn btn-cancel" id="cancelBtn">Cancel</button>

  <script>
    // Parse current settings from URL params
    function getParam(name) {
      var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return match ? decodeURIComponent(match[1]) : '';
    }

    // Populate fields with current values
    var zipField = document.getElementById('zipCode');
    var stationField = document.getElementById('stationId');

    zipField.value = getParam('zip') || '';
    stationField.value = getParam('station') || '';

    // Set display mode toggle
    var currentMode = getParam('mode') || '0';
    if (currentMode === '1') {
      document.getElementById('modeDetailed').checked = true;
    } else {
      document.getElementById('modeMinimal').checked = true;
    }

    // Detect return method: CloudPebble uses return_to param, real phone uses pebblejs://close
    var returnTo = getParam('return_to');

    function returnResult(jsonString) {
      if (returnTo) {
        // CloudPebble: redirect back with config data as hash
        var url = returnTo + '#' + encodeURIComponent(jsonString);
        window.location.href = url;
      } else {
        // Real Pebble phone app
        window.location.href = 'pebblejs://close#' + encodeURIComponent(jsonString);
      }
    }

    function returnCancel() {
      if (returnTo) {
        window.location.href = returnTo;
      } else {
        window.location.href = 'pebblejs://close';
      }
    }

    // Save button
    document.getElementById('saveBtn').addEventListener('click', function () {
      var selectedMode = document.querySelector('input[name="displayMode"]:checked');
      var result = {
        zipCode: zipField.value.trim(),
        stationId: stationField.value.trim(),
        displayMode: selectedMode ? selectedMode.value : '0'
      };

      returnResult(JSON.stringify(result));
    });

    // Cancel button
    document.getElementById('cancelBtn').addEventListener('click', function () {
      returnCancel();
    });
  </script>
</body>
</html>
